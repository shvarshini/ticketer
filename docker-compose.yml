version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ticketer
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketer"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://ticketer:password@db:5432/ticketer?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

